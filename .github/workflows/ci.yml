name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare config for wrapper commands
        run: |
          cp config.yaml.example config.yaml

      - name: Ensure wrapper executable
        run: chmod +x run.sh

      - name: Build dev dependencies image via wrapper
        run: ./run.sh install

      - name: Run tests via wrapper
        run: ./run.sh test

      - name: Run quality via wrapper
        run: ./run.sh quality

  e2e:
    runs-on: ubuntu-latest
    needs: test-and-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare config for wrapper commands
        run: |
          cp config.yaml.example config.yaml

      - name: Ensure wrapper executable
        run: chmod +x run.sh

      - name: Build dev dependencies image via wrapper
        run: ./run.sh install

      - name: Run e2e integration tests via wrapper
        run: ./run.sh e2e

  fs-e2e:
    runs-on: ubuntu-latest
    needs: test-and-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare config for wrapper commands
        run: |
          cp config.yaml.example config.yaml

      - name: Ensure wrapper executable
        run: chmod +x run.sh

      - name: Build dev dependencies image via wrapper
        run: ./run.sh install

      - name: Run filesystem e2e tests via wrapper
        run: ./run.sh fs-e2e
