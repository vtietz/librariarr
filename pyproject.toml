[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C90"]

[tool.ruff.lint.mccabe]
max-complexity = 12

[tool.pytest.ini_options]
markers = [
	"e2e: marks end-to-end integration tests against live Arr services",
	"fs_e2e: marks end-to-end filesystem tests run via ./run.sh fs-e2e",
]
