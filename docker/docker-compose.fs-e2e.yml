services:
  librariarr-e2e:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: librariarr-e2e
    user: "${PUID:-1000}:${PGID:-1000}"
    working_dir: /app
    environment:
      LIBRARIARR_E2E_PERSIST_ROOT: /e2e
    volumes:
      - ../:/app
      - ../.e2e-data:/e2e
    entrypoint: ["bash", "-lc"]
    command:
      - |
        PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=/app pytest -q -m fs_e2e -p no:cacheprovider
