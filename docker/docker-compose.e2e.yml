services:
  radarr-test:
    image: ${RADARR_TEST_IMAGE:-lscr.io/linuxserver/radarr:latest}
    container_name: librariarr-radarr-test
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Etc/UTC}
    volumes:
      - radarr-e2e-appdata:/config
      - ../.e2e-data/arr-e2e:/e2e

  sonarr-test:
    image: ${SONARR_TEST_IMAGE:-lscr.io/linuxserver/sonarr:latest}
    container_name: librariarr-sonarr-test
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Etc/UTC}
    volumes:
      - sonarr-e2e-appdata:/config
      - ../.e2e-data/arr-e2e:/e2e

  librariarr-radarr-e2e:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: librariarr-radarr-e2e
    working_dir: /app
    user: "${PUID:-1000}:${PGID:-1000}"
    depends_on:
      - radarr-test
      - sonarr-test
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPATH: /app
      LIBRARIARR_RADARR_E2E_URL: http://radarr-test:7878
      LIBRARIARR_SONARR_E2E_URL: http://sonarr-test:8989
      LIBRARIARR_E2E_PERSIST_ROOT: /e2e
    volumes:
      - ../:/app
      - ../.e2e-data/arr-e2e:/e2e
      - radarr-e2e-appdata:/radarr-config:ro
      - sonarr-e2e-appdata:/sonarr-config:ro
    entrypoint: ["bash", "-lc"]
    command:
      - |
        pytest -q -rs -m e2e -p no:cacheprovider

volumes:
  radarr-e2e-appdata:
  sonarr-e2e-appdata:
