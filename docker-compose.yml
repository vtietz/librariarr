services:
  librariarr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: librariarr
    user: "${PUID:-1000}:${PGID:-1000}"
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Etc/UTC}
      LIBRARIARR_RADARR_URL: ${LIBRARIARR_RADARR_URL:-http://radarr:7878}
      LIBRARIARR_RADARR_API_KEY: ${LIBRARIARR_RADARR_API_KEY:-}
      LIBRARIARR_SONARR_URL: ${LIBRARIARR_SONARR_URL:-http://sonarr:8989}
      LIBRARIARR_SONARR_API_KEY: ${LIBRARIARR_SONARR_API_KEY:-}
    volumes:
      - ./config.yaml:/config/config.yaml
      - ${MEDIA_ROOT:-/data}:/data
    ports:
      - "${LIBRARIARR_WEB_PORT:-8787}:8787"
    command:
      [
        "--config",
        "/config/config.yaml",
        "--log-level",
        "${LIBRARIARR_LOG_LEVEL:-INFO}",
        "--web",
      ]
