services:
  librariarr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: librariarr
    restart: unless-stopped
    environment:
      LIBRARIARR_RADARR_URL: ${LIBRARIARR_RADARR_URL:-http://radarr:7878}
      LIBRARIARR_RADARR_API_KEY: ${LIBRARIARR_RADARR_API_KEY:-}
      LIBRARIARR_RADARR_SYNC_ENABLED: ${LIBRARIARR_RADARR_SYNC_ENABLED:-true}
      LIBRARIARR_USE_NFO_ANALYSIS: ${LIBRARIARR_USE_NFO_ANALYSIS:-false}
      LIBRARIARR_USE_MEDIA_PROBE: ${LIBRARIARR_USE_MEDIA_PROBE:-false}
      LIBRARIARR_MEDIA_PROBE_BIN: ${LIBRARIARR_MEDIA_PROBE_BIN:-ffprobe}
      LIBRARIARR_SHADOW_ROOT: ${LIBRARIARR_SHADOW_ROOT:-/data/radarr_library}
      LIBRARIARR_NESTED_ROOTS: ${LIBRARIARR_NESTED_ROOTS:-/data/movies/age_06,/data/movies/age_12,/data/movies/age_16}
    volumes:
      - ./config.yaml:/config/config.yaml:ro
      - ${MOVIES_HOST_PATH:-/data/movies}:/data/movies
      - ${RADARR_LIBRARY_HOST_PATH:-/data/radarr_library}:/data/radarr_library
    command: ["--config", "/config/config.yaml", "--log-level", "${LIBRARIARR_LOG_LEVEL:-INFO}"]

  librariarr-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: librariarr-dev
    working_dir: /app
    profiles: ["dev"]
    environment:
      LIBRARIARR_RADARR_URL: ${LIBRARIARR_RADARR_URL:-http://radarr:7878}
      LIBRARIARR_RADARR_API_KEY: ${LIBRARIARR_RADARR_API_KEY:-}
      LIBRARIARR_RADARR_SYNC_ENABLED: ${LIBRARIARR_RADARR_SYNC_ENABLED:-true}
      LIBRARIARR_USE_NFO_ANALYSIS: ${LIBRARIARR_USE_NFO_ANALYSIS:-false}
      LIBRARIARR_USE_MEDIA_PROBE: ${LIBRARIARR_USE_MEDIA_PROBE:-false}
      LIBRARIARR_MEDIA_PROBE_BIN: ${LIBRARIARR_MEDIA_PROBE_BIN:-ffprobe}
      LIBRARIARR_SHADOW_ROOT: ${LIBRARIARR_SHADOW_ROOT:-/data/radarr_library}
      LIBRARIARR_NESTED_ROOTS: ${LIBRARIARR_NESTED_ROOTS:-/data/movies/age_06,/data/movies/age_12,/data/movies/age_16}
    volumes:
      - ./:/app
      - ./config.yaml:/config/config.yaml:ro
      - ${MOVIES_HOST_PATH:-/data/movies}:/data/movies
      - ${RADARR_LIBRARY_HOST_PATH:-/data/radarr_library}:/data/radarr_library
    entrypoint: ["bash", "-lc"]
    command:
      - |
        python -m librariarr.main --config /config/config.yaml --log-level ${LIBRARIARR_LOG_LEVEL:-DEBUG}
